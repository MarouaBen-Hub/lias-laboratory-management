<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>LIAS Laboratory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<nav th:fragment="nav" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="fas fa-flask me-2"></i>LIAS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <!-- Public -->
                <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="fas fa-home me-1"></i>Accueil</a></li>
                <!-- Membres SUPPRIMÉ (non CDC) -->
                <li class="nav-item"><a class="nav-link" th:href="@{/publications}"><i class="fas fa-book me-1"></i>Publications</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/evenements}"><i class="fas fa-calendar-alt me-1"></i>Événements</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/documents}"><i class="fas fa-folder-open me-1"></i>Documents</a></li>

                <!-- Directeur / Vice-Directeur -->
                <li class="nav-item" sec:authorize="hasAnyRole('DIRECTEUR', 'VICE_DIRECTEUR')">
                    <a class="nav-link" th:href="@{/demandes}">
                        <i class="fas fa-clipboard-list me-1"></i>Demandes
                        <span class="badge bg-danger ms-1" th:if="${@demandeAdhesionService.countEnAttente() > 0}"
                              th:text="${@demandeAdhesionService.countEnAttente()}">0</span>
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('DIRECTEUR', 'VICE_DIRECTEUR')">
                    <a class="nav-link" th:href="@{/mandats}"><i class="fas fa-crown me-1"></i>Mandats</a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('DIRECTEUR', 'VICE_DIRECTEUR')">
                    <a class="nav-link" th:href="@{/rapports}"><i class="fas fa-chart-bar me-1"></i>Rapports</a>
                </li>

                <!-- Matériel (tous connectés) -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/materiel}"><i class="fas fa-boxes me-1"></i>Matériel</a>
                </li>

                <!-- Réunions SUPPRIMÉ (non CDC) -->
                <li class="nav-item"><a class="nav-link" th:href="@{/pv}"><i class="fas fa-file-alt me-1"></i>Procès-verbaux</a></li>
            </ul>

            <ul class="navbar-nav">
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/login}"><i class="fas fa-sign-in-alt me-1"></i>Connexion</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/demandes/adherer}"><i class="fas fa-user-plus me-1"></i>Rejoindre</a>
                </li>
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle me-1"></i><span sec:authentication="name"></span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" th:href="@{/profil}"><i class="fas fa-id-card me-1"></i>Mon profil</a></li>
                        <li sec:authorize="hasRole('DIRECTEUR')">
                            <a class="dropdown-item" th:href="@{/admin}"><i class="fas fa-cogs me-1"></i>Administration</a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item"><i class="fas fa-sign-out-alt me-1"></i>Déconnexion</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4 mb-5">
    <th:block th:replace="${content}"></th:block>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
