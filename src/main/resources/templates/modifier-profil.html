<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier Profil - LIAS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layout :: nav}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/membres}">Membres</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/membres/{id}(id=${membre.id})}" th:text="${membre.prenom + ' ' + membre.nom}">Nom</a></li>
                    <li class="breadcrumb-item active">Modifier</li>
                </ol>
            </nav>

            <div class="card shadow">
                <div class="card-header bg-primary text-white py-3">
                    <h4 class="mb-0"><i class="fas fa-edit me-2"></i>Modifier mes informations de profil</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/membres/{id}/modifier(id=${membre.id})}" method="post" th:object="${membre}">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Prénom *</label>
                                <input type="text" th:field="*{prenom}" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Nom *</label>
                                <input type="text" th:field="*{nom}" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email *</label>
                            <input type="email" th:field="*{email}" class="form-control" required readonly>
                            <div class="form-text text-danger">L'email ne peut pas être modifié. Il sert d'identifiant de connexion.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Lien de photo de profil</label>
                            <input type="text" th:field="*{photo}" class="form-control" placeholder="https://example.com/maphoto.jpg">
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Établissement d'origine</label>
                                <input type="text" th:field="*{etablissement}" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Laboratoire d'origine</label>
                                <input type="text" th:field="*{laboratoireOrigine}" class="form-control">
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Date de naissance</label>
                                <input type="date" th:field="*{dateNaissance}" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Date d'embauche</label>
                                <input type="date" th:field="*{dateEmbauche}" class="form-control">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Biographie</label>
                            <textarea th:field="*{biographie}" class="form-control" rows="5" placeholder="Quelques mots sur votre parcours scientifique..."></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Centres d'intérêt</label>
                            <input type="text" th:field="*{centresInteret}" class="form-control" placeholder="IA, IoT, Big Data, Automatique (séparés par des virgules)">
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/membres/{id}(id=${membre.id})}" class="btn btn-outline-secondary">
                                <i class="fas fa-times me-1"></i>Annuler
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i>Enregistrer les modifications
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
