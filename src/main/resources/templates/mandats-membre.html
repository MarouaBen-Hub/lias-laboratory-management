<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique des Mandats - LIAS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layout :: nav}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/membres}">Membres</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/membres/{id}(id=${membre.id})}" th:text="${membre.prenom + ' ' + membre.nom}">Nom</a></li>
                    <li class="breadcrumb-item active">Mandats</li>
                </ol>
            </nav>

            <div class="card shadow">
                <div class="card-header bg-primary text-white py-3">
                    <h4 class="mb-0"><i class="fas fa-crown me-2"></i>Historique des mandats de <span th:text="${membre.prenom + ' ' + membre.nom}">Membre</span></h4>
                </div>
                <div class="card-body p-4">
                    <div class="table-responsive" th:if="${not #lists.isEmpty(mandats)}">
                        <table class="table table-hover align-middle">
                            <thead class="table-dark">
                            <tr>
                                <th>Rôle</th>
                                <th>Date début</th>
                                <th>Date fin</th>
                                <th>Statut</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="m : ${mandats}">
                                <td><span class="badge bg-info text-dark" th:text="${m.role}">RÔLE</span></td>
                                <td th:text="${#temporals.format(m.dateDebut, 'dd/MM/yyyy')}">01/01/2024</td>
                                <td th:text="${m.dateFin != null} ? ${#temporals.format(m.dateFin, 'dd/MM/yyyy')} : '-'">-</td>
                                <td>
                                    <span class="badge" th:classappend="${m.actif} ? 'bg-success' : 'bg-secondary'" th:text="${m.actif} ? 'Actif' : 'Terminé'">Statut</span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div th:if="${#lists.isEmpty(mandats)}" class="alert alert-info text-center py-4">
                        <i class="fas fa-crown fa-2x mb-2"></i>
                        <p class="mb-0">Ce membre n'a exercé aucun mandat de gouvernance.</p>
                    </div>

                    <div class="d-flex justify-content-start border-top pt-3 mt-3">
                        <a th:href="@{/membres/{id}(id=${membre.id})}" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-1"></i>Retour au profil
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
