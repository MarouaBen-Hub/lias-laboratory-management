<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Événements - LIAS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .event-card { transition: transform 0.2s; }
        .event-card:hover { transform: translateY(-3px); }
        .statut-planifie { border-left: 4px solid #0d6efd; }
        .statut-en-cours { border-left: 4px solid #198754; }
        .statut-termine { border-left: 4px solid #6c757d; }
        .statut-annule { border-left: 4px solid #dc3545; }
    </style>
</head>
<body class="bg-light">
<div th:replace="~{layout :: nav}"></div>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-calendar-alt me-2"></i>Événements scientifiques</h2>
        <a sec:authorize="hasAnyRole('DIRECTEUR', 'VICE_DIRECTEUR', 'CHEF_EQUIPE')"
           th:href="@{/evenements/nouveau}" class="btn btn-primary">
            <i class="fas fa-plus me-1"></i>Nouvel événement
        </a>
    </div>

    <!-- Filtres -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/evenements}" method="get" class="row g-3">
                <div class="col-md-4">
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-search"></i></span>
                        <input type="text" name="recherche" class="form-control" placeholder="Rechercher..." th:value="${recherche}">
                    </div>
                </div>
                <div class="col-md-3">
                    <select name="type" class="form-select">
                        <option value="">Tous les types</option>
                        <option th:each="t : ${types}" th:value="${t}" th:text="${t}" th:selected="${typeFiltre == t}">Type</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select name="periode" class="form-select">
                        <option value="">Toutes les périodes</option>
                        <option value="avenir" th:selected="${periode == 'avenir'}">À venir</option>
                        <option value="passe" th:selected="${periode == 'passe'}">Passés</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-outline-primary w-100">Filtrer</button>
                </div>
            </form>
            <div class="mt-2">
                <a th:href="@{/evenements}" class="btn btn-sm btn-outline-secondary">Réinitialiser</a>
            </div>
        </div>
    </div>

    <!-- Liste -->
    <div class="row">
        <div th:each="evt : ${evenements}" class="col-md-6 col-lg-4 mb-4">
            <div class="card h-100 shadow-sm event-card"
                 th:classappend="' statut-' + ${#strings.toLowerCase(evt.statut)}">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                            <span class="badge"
                                  th:class="${evt.statut.name() == 'PLANIFIE'} ? 'bg-primary' :
                                           (${evt.statut.name() == 'EN_COURS'} ? 'bg-success' :
                                           (${evt.statut.name() == 'TERMINE'} ? 'bg-secondary' : 'bg-danger'))"
                                  th:text="${evt.statut}">STATUT</span>
                        <span class="badge bg-info text-dark" th:text="${evt.type}">TYPE</span>
                    </div>

                    <h5 class="card-title" th:text="${evt.titre}">Titre</h5>
                    <p class="card-text text-muted small" th:text="${#strings.abbreviate(evt.description, 100)}">Description...</p>

                    <div class="mb-2">
                        <small class="text-muted">
                            <i class="fas fa-map-marker-alt me-1"></i>
                            <span th:text="${evt.lieu} ?: 'Lieu non précisé'">Lieu</span>
                        </small>
                    </div>

                    <div class="mb-3">
                        <small class="text-muted">
                            <i class="fas fa-clock me-1"></i>
                            <span th:text="${#temporals.format(evt.dateDebut, 'dd/MM/yyyy HH:mm')}">01/01/2024</span>
                            <span th:if="${evt.dateFin}"> - <span th:text="${#temporals.format(evt.dateFin, 'dd/MM/yyyy HH:mm')}">02/01/2024</span></span>
                        </small>
                    </div>

                    <div class="mb-3">
                        <small class="text-muted">
                            <i class="fas fa-user me-1"></i>
                            <span th:text="${evt.organisateur != null ? evt.organisateur.nomComplet : 'Non spécifié'}">Organisateur</span>
                        </small>
                    </div>

                    <div class="d-flex justify-content-between align-items-center">
                        <a th:href="@{/evenements/{id}(id=${evt.id})}" class="btn btn-sm btn-outline-primary">
                            <i class="fas fa-eye me-1"></i>Détail
                        </a>
                        <div sec:authorize="isAuthenticated()">
                            <a th:if="${@evenementService.canEdit(evt.id, #authentication.name)}"
                               th:href="@{/evenements/{id}/modifier(id=${evt.id})}"
                               class="btn btn-sm btn-outline-warning me-1">
                                <i class="fas fa-edit"></i>
                            </a>
                            <form th:if="${@evenementService.canEdit(evt.id, #authentication.name)}"
                                  th:action="@{/evenements/{id}/supprimer(id=${evt.id})}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('Supprimer cet événement ?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(evenements)}" class="text-center text-muted py-5">
        <i class="fas fa-calendar-times fa-3x mb-3"></i>
        <p>Aucun événement trouvé.</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
