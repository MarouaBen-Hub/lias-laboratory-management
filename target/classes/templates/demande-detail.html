<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail de la demande - LIAS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layout :: nav}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/demandes}">Demandes</a></li>
                    <li class="breadcrumb-item active">Détail</li>
                </ol>
            </nav>

            <div class="card shadow">
                <div class="card-header bg-primary text-white py-3">
                    <h4 class="mb-0"><i class="fas fa-file-invoice me-2"></i>Détail de la demande d'adhésion</h4>
                </div>
                <div class="card-body p-4">
                    <div class="row mb-3">
                        <div class="col-sm-3 text-muted">Date de soumission</div>
                        <div class="col-sm-9" th:text="${#temporals.format(demande.dateSoumission, 'dd/MM/yyyy à HH:mm')}">01/01/2024</div>
                    </div>
                    <hr>
                    <div class="row mb-3">
                        <div class="col-sm-3 text-muted">Candidat</div>
                        <div class="col-sm-9"><strong th:text="${demande.prenom + ' ' + demande.nom}">Nom</strong></div>
                    </div>
                    <hr>
                    <div class="row mb-3">
                        <div class="col-sm-3 text-muted">Email</div>
                        <div class="col-sm-9"><a th:href="'mailto:' + ${demande.email}" th:text="${demande.email}">email</a></div>
                    </div>
                    <hr>
                    <div class="row mb-3">
                        <div class="col-sm-3 text-muted">Statut</div>
                        <div class="col-sm-9">
                            <span class="badge"
                                  th:class="${demande.statut.name() == 'EN_ATTENTE'} ? 'bg-warning text-dark' :
                                           (${demande.statut.name() == 'ACCEPTEE'} ? 'bg-success' : 'bg-danger')"
                                  th:text="${demande.statut}">STATUT</span>
                        </div>
                    </div>
                    
                    <div th:if="${demande.decideur != null}" class="row mb-3">
                        <div class="col-sm-3 text-muted">Décidé par</div>
                        <div class="col-sm-9" th:text="${demande.decideur.nomComplet}">Nom décideur</div>
                    </div>
                    <div th:if="${demande.dateDecision != null}" class="row mb-3">
                        <div class="col-sm-3 text-muted">Date décision</div>
                        <div class="col-sm-9" th:text="${#temporals.format(demande.dateDecision, 'dd/MM/yyyy à HH:mm')}">02/01/2024</div>
                    </div>
                    <hr>
                    
                    <div class="mb-3">
                        <div class="text-muted mb-2">Motivation / Message</div>
                        <div class="p-3 bg-light rounded" style="white-space: pre-wrap;" th:text="${demande.motivation}">Motivation...</div>
                    </div>
                    <hr>
                    
                    <div class="mb-4">
                        <div class="text-muted mb-2">CV / Profil externe</div>
                        <a th:href="${demande.cvUrl}" target="_blank" class="btn btn-sm btn-outline-secondary">
                            <i class="fas fa-external-link-alt me-1"></i>Consulter le CV / Lien
                        </a>
                    </div>

                    <div class="d-flex justify-content-between border-top pt-3">
                        <a th:href="@{/demandes}" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-1"></i>Retour
                        </a>
                        <div th:if="${demande.statut.name() == 'EN_ATTENTE'}" sec:authorize="hasAnyRole('DIRECTEUR', 'VICE_DIRECTEUR')">
                            <form th:action="@{/demandes/{id}/refuser(id=${demande.id})}" method="post" class="d-inline-block me-2">
                                <button type="submit" class="btn btn-danger" onclick="return confirm('Confirmer le refus de cette demande ?')">
                                    <i class="fas fa-times me-1"></i>Refuser
                                </button>
                            </form>
                            <form th:action="@{/demandes/{id}/accepter(id=${demande.id})}" method="post" class="d-inline-block">
                                <button type="submit" class="btn btn-success" onclick="return confirm('Confirmer l\'acceptation ? Un compte membre sera créé.')">
                                    <i class="fas fa-check me-1"></i>Accepter & Créer le compte
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
