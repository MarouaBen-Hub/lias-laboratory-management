<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejoindre le Laboratoire - LIAS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1a5276; --secondary: #2874a6; }
        .bg-primary-custom { background: var(--primary); color: white; }
        .btn-primary-custom { background: var(--primary); color: white; border: none; }
        .btn-primary-custom:hover { background: var(--secondary); color: white; }
    </style>
</head>
<body class="bg-light">
<div th:replace="~{layout :: nav}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header bg-primary-custom py-3">
                    <h4 class="mb-0"><i class="fas fa-user-plus me-2"></i>Demander l'adhésion au laboratoire LIAS</h4>
                </div>
                <div class="card-body p-4">
                    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                        <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/demandes/adherer}" method="post" th:object="${demande}">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Prénom *</label>
                                <input type="text" th:field="*{prenom}" class="form-control" required placeholder="Votre prénom">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Nom *</label>
                                <input type="text" th:field="*{nom}" class="form-control" required placeholder="Votre nom">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Adresse email *</label>
                            <input type="email" th:field="*{email}" class="form-control" required placeholder="votre.email@adresse.com">
                            <div class="form-text">Cet email sera utilisé pour créer votre compte si votre demande est acceptée.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Motivation / Message *</label>
                            <textarea th:field="*{motivation}" class="form-control" rows="5" required placeholder="Pourquoi souhaitez-vous rejoindre le laboratoire LIAS ?"></textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">CV en ligne / Lien externe (LinkedIn, Scholar...) *</label>
                            <input type="url" th:field="*{cvUrl}" class="form-control" required placeholder="https://linkedin.com/in/... ou Google Scholar">
                        </div>

                        <div class="d-flex justify-content-between align-items-center">
                            <a href="/" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-1"></i>Retour
                            </a>
                            <button type="submit" class="btn btn-primary-custom px-4 py-2">
                                <i class="fas fa-paper-plane me-1"></i>Soumettre la demande
                            </button>
                        </div>
                    </form>
                    
                    <div class="mt-4 pt-3 border-top text-center">
                        <p class="mb-1 text-muted">Déjà soumis une demande ?</p>
                        <a href="/demandes/suivi" class="text-decoration-none">Suivre l'état de mes demandes</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
