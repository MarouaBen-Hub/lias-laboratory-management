<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des demandes - LIAS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{layout :: nav}"></div>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-clipboard-list me-2"></i>Gestion des demandes d'adhésion</h2>
        <span class="badge bg-warning text-dark fs-6">
                <i class="fas fa-clock me-1"></i><span th:text="${nbEnAttente}">0</span> en attente
            </span>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filtres -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/demandes}" method="get" class="d-flex gap-2">
                <select name="statut" class="form-select w-auto">
                    <option value="">En attente (défaut)</option>
                    <option th:each="s : ${statuts}" th:value="${s}" th:text="${s}" th:selected="${statutFiltre == s}">Statut</option>
                </select>
                <button type="submit" class="btn btn-outline-primary">Filtrer</button>
            </form>
        </div>
    </div>

    <div class="card shadow">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Date</th>
                    <th>Nom</th>
                    <th>Email</th>
                    <th>Statut</th>
                    <th>Décideur</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="d : ${demandes}">
                    <td th:text="${#temporals.format(d.dateSoumission, 'dd/MM/yyyy HH:mm')}">01/01/2024</td>
                    <td th:text="${d.prenom + ' ' + d.nom}">Nom</td>
                    <td th:text="${d.email}">email</td>
                    <td>
                                <span class="badge"
                                      th:class="${d.statut.name() == 'EN_ATTENTE'} ? 'bg-warning text-dark' :
                                               (${d.statut.name() == 'ACCEPTEE'} ? 'bg-success' : 'bg-danger')"
                                      th:text="${d.statut}">STATUT</span>
                    </td>
                    <td>
                        <span th:if="${d.decideur != null}" th:text="${d.decideur.nomComplet}">Nom</span>
                        <span th:if="${d.decideur == null}" class="text-muted">-</span>
                    </td>
                    <td>
                        <a th:href="@{/demandes/{id}(id=${d.id})}" class="btn btn-sm btn-outline-primary">
                            <i class="fas fa-eye"></i>
                        </a>
                        <form th:if="${d.statut.name() == 'EN_ATTENTE'}"
                              th:action="@{/demandes/{id}/accepter(id=${d.id})}"
                              method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-success" title="Accepter">
                                <i class="fas fa-check"></i>
                            </button>
                        </form>
                        <form th:if="${d.statut.name() == 'EN_ATTENTE'}"
                              th:action="@{/demandes/{id}/refuser(id=${d.id})}"
                              method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-danger" title="Refuser">
                                <i class="fas fa-times"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${#lists.isEmpty(demandes)}" class="text-center text-muted py-5">
            <i class="fas fa-inbox fa-3x mb-3"></i>
            <p>Aucune demande trouvée.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
